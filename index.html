document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"fd09b161-bd5c-4c0f-b373-aaec4b71c9c9\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,body{margin:0;padding:0;height:100%;background:var(--pageBg,#0b0f14)}\ninput,select,textarea,button{font-family:inherit}\ntextarea,input,select{-webkit-appearance:none;appearance:none}\n::placeholder{color:var(--sub);opacity:.65}\nbutton{cursor:pointer;border:none;background:none}\ncanvas{touch-action:none;display:block}\nselect{background-image:linear-gradient(45deg,transparent 50%,var(--sub) 50%),linear-gradient(135deg,var(--sub) 50%,transparent 50%);background-position:calc(100% - 20px) 54%,calc(100% - 14px) 54%;background-size:6px 6px,6px 6px;background-repeat:no-repeat}\n@keyframes scpop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}\n@keyframes scslide{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}\n@keyframes sctoast{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}\n@keyframes scspin{to{transform:rotate(360deg)}}\n::-webkit-scrollbar{width:0;height:0}\n<\u002Fstyle>\n<script src=\"89bd2e09-d9eb-41f6-b0d4-99124fe39115\"><\u002Fscript>\n<script src=\"4040d788-8a0c-4f34-a788-9342cd5ef4b2\"><\u002Fscript>\n<link rel=\"manifest\" href=\"manifest.webmanifest\">\n<meta name=\"theme-color\" content=\"#2D3691\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n<meta name=\"apple-mobile-web-app-title\" content=\"SCC Documents\">\n<link rel=\"apple-touch-icon\" href=\"73fda9b9-cd2c-4e8a-9ba8-d8703ab10527\">\n<\u002Fhelmet>\n\n<div style=\"{{ vars }}\">\n  <div style=\"width:100%;max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--bg)\">\n\n    <!-- ================= LOGIN ================= -->\n    <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;overflow:auto\">\n      <div style=\"width:100%;max-width:360px\">\n        <div style=\"display:flex;justify-content:center;margin-bottom:20px\"><div style=\"background:#fff;border-radius:12px;padding:10px 14px;box-shadow:0 0 0 1px rgba(0,0,0,.06)\"><img src=\"1f0cf151-cfc7-41a3-a951-94bd48d5992b\" alt=\"Simmons Civil Contracting\" style=\"height:34px;width:auto;display:block\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:800;color:var(--text);text-align:center\">Documentation Portal<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--sub);text-align:center;margin-top:4px\">Sign in to continue<\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 16px;margin-top:22px;box-shadow:var(--shadow)\">\n          <label style=\"display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px\">Your name<\u002Flabel>\n          <div style=\"display:flex;gap:10px\">\n            <input type=\"text\" value=\"{{ loginFirst }}\" sc-camel-on-change=\"{{ setLoginFirst }}\" placeholder=\"First name\" autocomplete=\"given-name\" style=\"flex:1;min-width:0;height:52px;padding:0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:15px;font-weight:700\">\n            <input type=\"text\" value=\"{{ loginLast }}\" sc-camel-on-change=\"{{ setLoginLast }}\" placeholder=\"Last name\" autocomplete=\"family-name\" style=\"flex:1;min-width:0;height:52px;padding:0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:15px;font-weight:700\">\n          <\u002Fdiv>\n          <label style=\"display:block;font-size:13px;font-weight:700;color:var(--text);margin:16px 0 8px\">PIN<\u002Flabel>\n          <input type=\"password\" inputmode=\"numeric\" value=\"{{ loginPin }}\" sc-camel-on-change=\"{{ setLoginPin }}\" placeholder=\"••••\" maxlength=\"6\" style=\"width:100%;height:54px;padding:0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:24px;font-weight:800;letter-spacing:10px;text-align:center\">\n          <sc-if value=\"{{ loginHasErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:var(--danger);font-weight:700;margin-top:10px;text-align:center\">{{ loginErr }}<\u002Fdiv><\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ doLogin }}\" style=\"width:100%;height:54px;margin-top:16px;border-radius:14px;background:var(--primary);color:var(--primaryText);font-size:15.5px;font-weight:800;box-shadow:0 4px 14px var(--primaryGlow)\">Sign in<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--sub);text-align:center;margin-top:14px;line-height:1.5\">Ask your supervisor if you don’t have a PIN.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- APP BAR -->\n    <div style=\"position:sticky;top:0;z-index:40;background:var(--appBar);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;min-height:58px\">\n      <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <button sc-camel-on-click=\"{{ goBack }}\" aria-label=\"Back\" style=\"width:44px;height:44px;border-radius:12px;background:var(--cardAlt);border:1px solid var(--border);color:var(--text);font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 auto\">‹<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <button sc-camel-on-click=\"{{ openAbout }}\" aria-label=\"About\" style=\"background:#ffffff;border-radius:10px;padding:5px 9px;display:flex;align-items:center;flex:0 0 auto\">\n          <img src=\"1f0cf151-cfc7-41a3-a951-94bd48d5992b\" alt=\"Simmons Civil Contracting\" style=\"height:26px;width:auto;display:block\">\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"flex:1 1 auto;min-width:0\">\n        <div style=\"font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ barTitle }}<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ barSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ openSettings }}\" aria-label=\"Settings\" style=\"height:38px;width:38px;flex:0 0 auto;border-radius:999px;background:var(--cardAlt);border:1px solid var(--border);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:18px\">⚙<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- UPDATE BANNER -->\n    <sc-if value=\"{{ isOffline }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:var(--warnSoft);color:var(--warn);padding:9px 14px;display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:800;border-bottom:1px solid var(--border)\">\n        <span style=\"font-size:14px;flex:0 0 auto\">◴<\u002Fspan>\n        <span>You're offline — submitted forms will send automatically when you're back online.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- UPDATE BANNER -->\n    <sc-if value=\"{{ updateReady }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:var(--primary);color:var(--primaryText);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13.5px;font-weight:700\">\n        <span>A new version is available.<\u002Fspan>\n        <button sc-camel-on-click=\"{{ applyUpdate }}\" style=\"flex:0 0 auto;height:34px;padding:0 14px;border-radius:8px;background:#fff;color:var(--primary);font-size:13px;font-weight:800\">Update now<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= HOME ================= -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;padding:20px 16px 44px;animation:scslide .28s ease\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n        <div style=\"min-width:0\">\n          <div style=\"font-size:14px;color:var(--sub);font-weight:600\">{{ greeting }}<\u002Fdiv>\n          <div style=\"font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-top:2px\">{{ staffName }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--sub);font-weight:600;margin-top:2px\">{{ staffRole }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ logout }}\" style=\"flex:0 0 auto;margin-top:6px;height:34px;padding:0 13px;border-radius:999px;background:var(--cardAlt);border:1px solid var(--border);color:var(--sub);font-size:12.5px;font-weight:800\">Log out<\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ canInstall }}\" hint-placeholder-val=\"{{ false }}\">\n        <button sc-camel-on-click=\"{{ installApp }}\" style=\"width:100%;margin-top:16px;background:var(--accentSoft);border:1px solid var(--accent);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;text-align:left\">\n          <span style=\"width:38px;height:38px;flex:0 0 auto;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px\">⤓<\u002Fspan>\n          <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:14.5px;font-weight:800;color:var(--text)\">Install this app<\u002Fspan><span style=\"display:block;font-size:12.5px;color:var(--sub)\">Add to your home screen for offline use<\u002Fspan><\u002Fspan>\n          <span style=\"color:var(--accent);font-size:22px;flex:0 0 auto\">›<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n\n      <div style=\"margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:11px;font-weight:800;letter-spacing:1px;color:var(--accent)\">CURRENT PROJECT<\u002Fdiv>\n        <sc-raw-select value=\"{{ currentProject }}\" sc-camel-on-change=\"{{ onChangeProject }}\" style=\"width:100%;height:52px;margin-top:9px;padding:0 40px 0 14px;border-radius:12px;border:1px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:15px;font-weight:700\">\n          <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"4\"><option value=\"{{ p }}\">{{ p }}<\u002Foption><\u002Fsc-for>\n        <\u002Fsc-raw-select>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub);margin:26px 2px 12px\">MONTHLY FORMS<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr;gap:12px\">\n        <sc-if value=\"{{ noForms }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:var(--card);border:1px dashed var(--border);border-radius:14px;padding:22px;text-align:center;color:var(--sub);font-size:13.5px;line-height:1.5\">No forms are available for your access level yet.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <button sc-camel-on-click=\"{{ c.open }}\" style=\"width:100%;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:17px 15px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)\" style-active=\"transform:scale(.985)\">\n            <span style=\"{{ c.chip }}\">{{ c.code }}<\u002Fspan>\n            <span style=\"flex:1;min-width:0\">\n              <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:16.5px;font-weight:800;color:var(--text)\">{{ c.name }}<\u002Fspan><\u002Fspan>\n              <span style=\"display:block;font-size:12.5px;color:var(--sub);margin-top:3px;line-height:1.35\">{{ c.desc }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--accent);background:var(--accentSoft);padding:4px 9px;border-radius:6px\">MONTHLY · {{ c.formNo }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"color:var(--sub);font-size:28px;line-height:1;flex:0 0 auto\">›<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin:28px 2px 12px\">\n        <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub)\">THIS SESSION<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ goSubs }}\" style=\"font-size:13px;font-weight:800;color:var(--accent)\">View all<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-if value=\"{{ sessionEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:var(--card);border:1px dashed var(--border);border-radius:14px;padding:20px;text-align:center;color:var(--sub);font-size:13.5px;line-height:1.5\">Nothing yet this session.<br>Saved drafts and completed forms appear here.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ recent }}\" as=\"s\" hint-placeholder-count=\"0\">\n          <button sc-camel-on-click=\"{{ s.open }}\" style=\"text-align:left;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px\">\n            <span style=\"{{ s.dot }}\"><\u002Fspan>\n            <span style=\"flex:1;min-width:0\">\n              <span style=\"display:block;font-size:14.5px;font-weight:700;color:var(--text)\">{{ s.form }}<\u002Fspan>\n              <span style=\"display:block;font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ s.project }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"{{ s.pill }}\">{{ s.status }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= ABOUT ================= -->\n    <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ goHome }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 24px 40px;animation:scslide .28s ease;user-select:none;-webkit-user-select:none;cursor:pointer\">\n      <div style=\"background:#ffffff;border-radius:16px;padding:16px 22px;box-shadow:0 0 0 1px rgba(0,0,0,.06)\"><img src=\"1f0cf151-cfc7-41a3-a951-94bd48d5992b\" alt=\"Simmons Civil Contracting\" style=\"height:56px;width:auto;display:block\"><\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:800;color:var(--text);margin-top:20px\">SCC Documentation Portal<\u002Fdiv>\n      <div style=\"font-size:13.5px;font-weight:700;color:var(--sub);margin-top:6px\">Version: {{ appVersion }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--sub);margin-top:8px\">Latest Release: July 2026<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--sub);margin-top:2px\">Author: Aaron C<\u002Fdiv>\n      <p style=\"font-size:14px;color:var(--text);line-height:1.6;margin:24px 0 0;max-width:420px;text-align:justify;word-spacing:-1px;hyphens:auto;-webkit-hyphens:auto\">The SCC Documentation Portal has been developed to streamline the creation, management and standardisation of site documentation across Simmons Civil projects. The application is actively maintained, with version updates introducing new templates, workflow improvements, bug fixes and additional functionality based on user feedback and operational requirements.<\u002Fp>\n      <p style=\"font-size:14px;color:var(--text);line-height:1.6;margin:22px 0 0;max-width:420px\">Forms are part of our integrated management system.<\u002Fp>\n      <div style=\"display:flex;justify-content:center;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-top:22px\">\n        <img src=\"e4a666a1-b142-420e-b861-bc44eeedf575\" alt=\"ISO 9001 Quality\" style=\"height:96px;width:auto;display:block\">\n        <img src=\"33102055-f3b4-4fe9-a262-5fbe0deba187\" alt=\"ISO 14001 Environmental\" style=\"height:96px;width:auto;display:block\">\n        <img src=\"f9133ad8-5c71-4740-95a4-6d998e7fc6a8\" alt=\"ISO 45001 OH&amp;S\" style=\"height:96px;width:auto;display:block\">\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;margin-top:16px\">\n        <img src=\"e3ea619d-a937-4a3b-8249-49f48c1f241e\" alt=\"JAS-ANZ\" style=\"height:46px;width:auto;display:block\">\n        <img src=\"1e09411a-be2e-4f36-a3ed-738f0b75c59f\" alt=\"cm3\" style=\"height:32px;width:auto;display:block\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= SETTINGS ================= -->\n    <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:1;padding:18px 16px 44px;animation:scslide .28s ease\">\n\n      <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub);margin:2px 2px 12px\">APPEARANCE<\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px\">\n        <div style=\"min-width:0\"><div style=\"font-size:15px;font-weight:700;color:var(--text)\">Theme<\u002Fdiv><div style=\"font-size:12.5px;color:var(--sub);margin-top:2px\">Light or dark appearance<\u002Fdiv><\u002Fdiv>\n        <button sc-camel-on-click=\"{{ toggleTheme }}\" style=\"flex:0 0 auto;height:40px;padding:0 16px;border-radius:999px;background:var(--cardAlt);border:1px solid var(--border);color:var(--text);font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:8px\"><span style=\"width:13px;height:13px;border-radius:50%;background:var(--themeDot);display:inline-block;box-shadow:inset -4px -4px 0 var(--themeDotInner)\"><\u002Fspan>{{ themeLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub);margin:26px 2px 12px\">SAVED SIGNATURE<\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:12px\">Draw your signature once and it's applied to every new form automatically. You can still re-sign on any individual form.<\u002Fdiv>\n        <sc-if value=\"{{ hasSavedSig }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12.5px;font-weight:800;color:var(--success);margin-bottom:8px\">✓ A signature is saved<\u002Fdiv><\u002Fsc-if>\n        <div style=\"border:1px solid var(--fieldBorder);border-radius:14px;background:var(--field);overflow:hidden\"><canvas ref=\"{{ settingsSigRef }}\" style=\"width:100%;height:170px;display:block\"><\u002Fcanvas><div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-top:1px dashed var(--border)\"><span style=\"font-size:12px;color:var(--sub)\">Sign above with your finger<\u002Fspan><button sc-camel-on-click=\"{{ clearSettingsPad }}\" style=\"font-size:12.5px;font-weight:800;color:var(--accent)\">Clear<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-top:14px\">\n          <button sc-camel-on-click=\"{{ saveSignature }}\" style=\"flex:1.4;height:50px;border-radius:12px;background:var(--primary);color:var(--primaryText);font-size:15px;font-weight:800;box-shadow:0 4px 14px var(--primaryGlow)\">Save signature<\u002Fbutton>\n          <sc-if value=\"{{ hasSavedSig }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ clearSavedSignature }}\" style=\"flex:1;height:50px;border-radius:12px;background:var(--dangerSoft);border:1px solid var(--dangerBorder);color:var(--dangerText);font-size:14px;font-weight:800\">Remove<\u002Fbutton><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub);margin:26px 2px 12px\">CLEAR SUBMITTED HISTORY<\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:12px\">How often to automatically clear <b style=\"color:var(--text)\">submitted<\u002Fb> forms from this device (they're already saved to the office). Drafts are always kept.<\u002Fdiv>\n        <sc-raw-select value=\"{{ clearFreq }}\" sc-camel-on-change=\"{{ setClearFreq }}\" style=\"width:100%;height:52px;padding:0 40px 0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:15px;font-weight:700\">\n          <option value=\"none\">Never (keep everything)<\u002Foption>\n          <option value=\"daily\">Daily<\u002Foption>\n          <option value=\"weekly\">Weekly<\u002Foption>\n          <option value=\"fortnightly\">Fortnightly<\u002Foption>\n          <option value=\"monthly\">Monthly<\u002Foption>\n          <option value=\"quarterly\">Quarterly<\u002Foption>\n          <option value=\"annually\">Annually<\u002Foption>\n        <\u002Fsc-raw-select>\n        <button sc-camel-on-click=\"{{ clearSubmittedNow }}\" style=\"width:100%;margin-top:12px;height:46px;border-radius:12px;background:var(--cardAlt);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:800\">Clear submitted now<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--sub);margin:26px 2px 12px\">SIGN-IN PIN<\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:14px\">Change the 6-digit PIN you use to sign in. You'll need your current PIN — only you can change your own PIN.<\u002Fdiv>\n        <label style=\"display:block;font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:7px\">Current PIN<\u002Flabel>\n        <input type=\"password\" inputmode=\"numeric\" value=\"{{ pinOld }}\" sc-camel-on-change=\"{{ setPinOld }}\" placeholder=\"••••\" maxlength=\"6\" autocomplete=\"current-password\" style=\"width:100%;height:50px;padding:0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:20px;font-weight:800;letter-spacing:8px;text-align:center\">\n        <label style=\"display:block;font-size:12.5px;font-weight:700;color:var(--text);margin:14px 0 7px\">New PIN<\u002Flabel>\n        <input type=\"password\" inputmode=\"numeric\" value=\"{{ pinNew }}\" sc-camel-on-change=\"{{ setPinNew }}\" placeholder=\"••••\" maxlength=\"6\" autocomplete=\"new-password\" style=\"width:100%;height:50px;padding:0 14px;border-radius:12px;border:1.5px solid var(--fieldBorder);background:var(--field);color:var(--text);font-size:20px;font-weight:800;letter-spacing:8px;text-align:center\">\n        <label style=\"display:block;font-size:12.5px;font-weight:700;color:var(--text);margin:14px 0 7px\">Confirm new PIN<\u002Flabel>\n        <input type=\"password\" inputmode=\"numeric\" value=\"{{ pinNew2 }}\" sc-camel-on-change=\"{{ setPinNew2 }}\" placeholder=\"••••\" maxlength=\"6\" autocomplete=\"new-password\" style=\"width:100%;height:50px;padding:0 14px;border-radius:1 002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:11px\">\n        <sc-if value=\"{{ hasDrafts }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;justify-content:flex-end;margin-bottom:2px\">\n            <button sc-camel-on-click=\"{{ askDeleteAll }}\" style=\"height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--dangerBorder);background:var(--dangerSoft);color:var(--dangerText);font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:6px\">🗑 Delete all drafts<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ subsList }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"position:relative\">\n          <button sc-camel-on-click=\"{{ s.onClick }}\" sc-camel-on-pointer-down=\"{{ s.holdStart }}\" sc-camel-on-pointer-up=\"{{ s.holdEnd }}\" sc-camel-on-pointer-leave=\"{{ s.holdEnd }}\" sc-camel-on-touch-start=\"{{ s.touchStart }}\" sc-camel-on-touch-move=\"{{ s.touchMove }}\" sc-camel-on-touch-end=\"{{ s.holdEnd }}\" style=\"text-align:left;width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow)\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px\">\n              <span style=\"{{ s.chip }}\">{{ s.code }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:15.5px;font-weight:800;color:var(--text);line-height:1.25\">{{ s.form }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ s.project }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"{{ s.pill }}\">{{ s.status }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--border)\">\n              <span style=\"font-size:12.5px;color:var(--sub);font-weight:600\">{{ s.date }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ s.resumable }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:10px;font-size:12px;font-weight:800;color:var(--accent)\">Tap to resume · swipe or hold to delete<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ s.viewable }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:10px;font-size:12px;font-weight:800;color:var(--sub)\">Tap to view ›<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fbutton>\n          <sc-if value=\"{{ s.revealed }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ s.askDelete }}\" aria-label=\"Delete draft\" style=\"position:absolute;top:0;right:0;bottom:0;width:66px;border:none;border-radius:0 16px 16px 0;background:var(--danger);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:-8px 0 16px rgba(0,0,0,.15)\">🗑<\u002Fbutton>\n          <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ s.syncing }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ s.retry }}\" style=\"align-self:flex-end;height:40px;padding:0 16px;border-radius:10px;border:none;background:var(--warn);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px\">↻ Try again now<\u002Fbutton>\n          <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ subsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;color:var(--sub);font-size:14px;padding:40px 0\">No submissions in this filter.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- CONFIRM DIALOG -->\n    <sc-if value=\"{{ confirmOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px\">\n        <div style=\"width:100%;max-width:320px;background:var(--card);border-radius:18px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.4);text-align:center\">\n          <div style=\"font-size:17px;font-weight:800;color:var(--text)\">Are you sure?<\u002Fdiv>\n          <div style=\"font-size:14px;color:var(--sub);margin-top:8px;line-height:1.5\">{{ confirmMsg }}<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:20px\">\n            <button sc-camel-on-click=\"{{ cancelConfirm }}\" style=\"flex:1;height:48px;border-radius:12px;background:var(--cardAlt);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:800\">No<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ doConfirm }}\" style=\"flex:1;height:48px;border-radius:12px;border:none;background:var(--danger);color:#fff;font-size:15px;font-weight:800\">Confirm<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TOAST -->\n    <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:60;background:var(--toastBg);color:var(--toastText);font-size:13.5px;font-weight:700;padding:12px 20px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:sctoast .25s ease;white-space:nowrap\">{{ toast }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\n/* ============================================================\n   PROJECTS — the list now lives in the plain-text file\n   projects.txt (one project per line). To add or remove a\n   project just edit that file; no code change needed.\n   The array below is only a fallback for the very first load\n   before projects.txt has been fetched or on a fresh install\n   with no connection. It's kept in sync automatically.\n   ============================================================ */\nconst DEFAULT_PROJECTS = [\n  '10296 Eastern Creek Rubbish Removal',\n  '10295 Lot K Kemps Creek',\n  '10294 270 Aldington Rd Kemps Creek',\n  '10293 AARU',\n  '10292 Lot J Kemps Creek',\n  '10291 Lot 9 Westgate Kemps Creek',\n  '10290 Yiribana West Buda Way Kemps Creek',\n  '10289 Lot 3A Oakdale East',\n  '10288 Woolworths Melonba Marsden Park',\n  '10287 16 Macpherson St Warriewood',\n  '10285 Lot F Kemps Creek',\n  '10284 Lot 90 Kemps Creek',\n  '10283 311 South St Marsden Park',\n  '10249 200 Aldington Rd Kemps Creek'\n];\nconst PROJECTS_KEY = 'scc_projects_v1';\nfunction parseProjectsText(txt){\n  return String(txt||'').split(/\\r?\\n/).map(l=>l.trim()).filter(l=>l && l[0]!=='#');\n}\n/* Live list: seed from the last-cached copy (so offline works), else the fallback. */\nlet PROJECTS = (function(){\n  try{ const c=JSON.parse(localStorage.getItem(PROJECTS_KEY)); if(Array.isArray(c)&&c.length) return c; }catch(e){}\n  return DEFAULT_PROJECTS.slice();\n})();\n\nconst ENV_TYPES = ['Water Quality','Truck Spill Kits','Sediment Controls','Plant Servicing','Dust','Runoff','Flora','MSDS','Asbestos','Noise','Rubbish','Land Damage','Fauna'];\nconst SAFE_TYPES = ['Working With Plant (Log Books)','First Aid Facilities','Signage','Scaffolding / Ladders','Formwork','Fire Extinguishers','Electrical Equipment','Trenches / Excavations','Barricades / Handrails','Safe Systems of Work','Traffic Management','Electrical Testing / RCDs','P.P.E.','Plant Safety Devices','Fall Prevention','House Keeping','Hazardous Substances','Hot Works','Confined Spaces','Manual Handling','Amenities'];\nconst PRIORITY = ['A — Immediate action','B — Within 24 hours','C — Within 1 week','D — Ongoing'];\n\n/* ============================================================\n   FORMS — add aceholder:'What action was or will be taken?'},\n      {id:'needsFix', type:'yesno', label:'Needs to be fixed?', required:true},\n      {id:'due', type:'date', label:'Date to be closed'},\n      {id:'photos', type:'photos', label:'Photos'}\n    ]\n  }\n};\n\n/* Apply any cached per-form access (from the Supabase form_types.allow_tiers\n   column) so offline launches honour the last-synced permissions. */\n(function(){\n  try{ const a=JSON.parse(localStorage.getItem(FORM_ACCESS_KEY));\n    if(a) Object.keys(FORMS).forEach(k=>{ const code=FORMS[k].code; if(Array.isArray(a[code])&&a[code].length) FORMS[k].allow=a[code].slice(); });\n  }catch(e){}\n})();\n\nconst HEADER = [\n  {id:'project', type:'project', label:'Project', required:true},\n  {id:'when', type:'datetime', label:'Date & time', required:true},\n  {id:'attendees', type:'notes', label:'Attendees', placeholder:'Who attended the inspection\\u2026'},\n  {id:'inspector', type:'text', label:'Inspected by', placeholder:'Name of inspector'}\n];\n\nconst STAFF = { name:'John Doe', role:'Site Supervisor \\u00b7 Crew B', initials:'JD' };\n\nconst TIERS_KEY = 'scc_tiers_v1';\nconst FORM_ACCESS_KEY = 'scc_form_access_v1';\n/* Access tiers, highest to lowest. Pulled from the Supabase `tiers` table on\n   login and cached here; the array is only a fallback before the first sync. */\nlet TIERS = (function(){\n  try{ const c=JSON.parse(localStorage.getItem(TIERS_KEY)); if(Array.isArray(c)&&c.length) return c; }catch(e){}\n  return ['Administrator','Engineer','Supervisor','Crew'];\n})();\nfunction tierFromRole(role){\n  const r=String(role||'').toLowerCase();\n  if(TIERS.indexOf(role)>=0) return role;\n  if(r.includes('admin')) return 'Administrator';\n  if(r.includes('engineer')) return 'Engineer';\n  if(r.includes('supervisor')) return 'Supervisor';\n  return 'Crew';\n}\n\n/* ============================================================\n   SUPABASE — offline-first, upload-only sync\n   ============================================================ */\nconst SB_URL = 'https://nabbbeavqlizjzfbtkuz.supabase.co';\nconst SB_KEY = 'sb_publishable_yB_JIDfND6kG8xZa7zQhDw_gkvYSzhw';\nconst SYNC_KEY = 'scc_sync_queue_v1';\n/* Offline outbox lives in IndexedDB, not localStorage: queued forms carry\n   base64 photos + a composed .docx that easily blow localStorage's ~5MB quota\n   (which silently drops the queue, so nothing retried on reopen). IndexedDB\n   holds them reliably until they're sent. */\nconst IDB_NAME='scc_outbox_db', IDB_STORE='outbox';\nfunction idbOpen(){ return new Promise((res,rej)=>{ try{ const r=indexedDB.open(IDB_NAME,1); r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE,{keyPath:'ref'}); }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }catch(e){ rej(e); } }); }\nasync function idbAll(){ try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,'readonly'); const rq=tx.objectStore(IDB_STORE).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }catch(e){ return []; } }\nasync function idbPut(rec){ try{ const db=await idbOpen(); await new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }catch(e){ console.warn('[idb] put failed', e); } }\nasync function idbDel(ref){ try{ const db=await idbOpen(); await new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).delete(ref); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }catch(e){} }\nfunction dataUrlToBlob(u){ const [h,b]=u.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/png'; const bin=atob(b); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:mime}); }\n\nconst SEED_SUBS=[];\nconst SEED_DRAFTS={};\nconst MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nfunction pad(n){ return String(n).padStart(2,'0'); }\n\n/* ============================================================\n   DOCX / DOCUMENT — SCC Styling Guide constants + helpers\n   ============================================================ */\nconst DOC = {\n  navy:'2D3691', lightBlue:'D6EEF9', accent:'29ACE4', dark:'444444',\n  subtle:'595959', stripe:'F2F2F2', white:'FFFFFF', border:'CCCCCC',\n  CONTENT_WIDTH:9638, PX_PER_CM:37.795275591, DXA_PER_CM:566.929\n};\nconst IMG_H_CM = 11;                         // photos: 11cm high, aspect preserved\nconst IMG_H_PX = Math.round(IMG_H_CM*DOC.PX_PER_CM);   // ~416px @96dpi\nconst DOC_BUCKET = 'documents';\nconst CODE_TO_KEY = { ECI:'env', SIH:'hazard' };\nfunction byteFromDataUrl(u){ const [h,b]=u.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/png'; const bin=atob(b); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return {bytes:arr, type:/png/i.test(mime)?'png':'jpg'}; }\nfunction imgDims(u){ return new Promise((res)=>{ const im=new Image(); im.onload=()=>res({w:im.naturalWidth||1,h:im.naturalHeight||1}); im.onerror=()=>res({w:4,h:3}); im.src=u; }); }\nfunction ddmmyyyy(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }\nasync function blobToB64(blob){ return new Promise((res)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',')[1]||''); r.readAsDataURL(blob); }); }\nfunction b64ToBlob(b64,type){ const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:type||'application/vnd.openxmlformats-officedocument.wordprocessingml.document'}); }\n\nclass Component extends DCLogic {\n  loadPersist(){ try{ return JSON.parse(localStorage.getItem('scc_app_v2'))||{}; }catch(e){ return {}; } }\n  persist(){ const s=this.
